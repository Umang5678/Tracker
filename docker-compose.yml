version: '3.8'

services:
  # MongoDB (for local development)
  mongo:
    image: mongo:7
    container_name: expense-tracker-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: expense-tracker
    volumes:
      - mongo-data:/data/db
    networks:
      - expense-tracker-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-tracker-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/expense-tracker
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      - JWT_EXPIRE=7d
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - expense-tracker-net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: expense-tracker-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - expense-tracker-net

volumes:
  mongo-data:
    driver: local

networks:
  expense-tracker-net:
    driver: bridge
